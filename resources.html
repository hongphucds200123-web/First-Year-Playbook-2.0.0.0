<!doctype html><html lang="vi"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FIRST YEAR PLAYBOOK • Digital Resources</title>
<style>
:root{--o:#f97316;--line:#ffe2cc;--muted:#64748b;--soft:#fff7ed;--shadow:0 10px 30px rgba(2,6,23,.06);--r:18px}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;background:#fff;color:#0f172a}
.top{position:sticky;top:0;background:rgba(255,255,255,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);z-index:9}
.wrap{max-width:1100px;margin:0 auto;padding:14px 16px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:space-between}
.brand{display:flex;gap:12px;align-items:center}.logo{width:40px;height:40px;border-radius:14px;background:var(--o)}
h1{margin:0;font-size:14px;font-weight:900}.muted{color:var(--muted);font-size:13px;line-height:1.6}
.btn{border:1px solid var(--line);background:#fff;padding:10px 12px;border-radius:14px;cursor:pointer;font-weight:800;font-size:12px}
.btn.soft{background:var(--soft);color:#9a3412}
.card{border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);background:#fff}
.card .bd{padding:16px}.grid{display:grid;gap:12px}
@media(min-width:900px){.grid3{grid-template-columns:1fr 1fr 1fr}}
a{color:var(--o);text-decoration:none}a:hover{text-decoration:underline}
nav{display:flex;gap:8px;flex-wrap:wrap}
nav a{border:1px solid var(--line);padding:8px 10px;border-radius:999px;background:var(--soft);font-weight:800;font-size:12px}
.section{border:1px solid var(--line);border-radius:14px;background:#fff;padding:14px}
.small{font-size:12px;color:var(--muted)}
hr{border:none;border-top:1px solid var(--line);margin:14px 0}
</style></head><body>
<div class="top"><div class="wrap row">
  <div class="brand"><div class="logo"></div><div>
    <h1 id="brand">FIRST YEAR PLAYBOOK</h1><div class="muted" id="tagline"></div>
  </div></div>
  <div class="row">
    <button class="btn" id="langBtn">VI</button>
    <nav>
      <a href="index.html" target="_blank">Home</a>
      <a href="first30.html" target="_blank">First 30 Days</a>
      <a href="roadmap.html" target="_blank">Roadmap</a>
      <a href="study.html" target="_blank">Study</a>
      <a href="resources.html" target="_blank">Resources</a>
      <a href="templates.html" target="_blank">Templates</a>
      <a href="faq.html" target="_blank">FAQ</a>
    </nav>
  </div>
</div></div>

<div class="wrap">
  <div class="card"><div class="bd">
    <div class="muted" style="font-weight:900;color:#9a3412" id="kicker">DIGITAL RESOURCES</div>
    <div style="font-size:26px;font-weight:900;line-height:1.15;margin:10px 0" id="title"></div>
    <div class="muted" id="sub"></div>

    <div class="grid" style="margin-top:12px">
      <div class="section">
        <b id="s1"></b>
        <div class="grid grid3" style="margin-top:10px" id="p1"></div>
      </div>

      <div class="section">
        <b id="s2"></b>
        <div class="grid grid3" style="margin-top:10px" id="p2"></div>
      </div>

      <div class="section">
        <b id="s3"></b>
        <div class="grid grid3" style="margin-top:10px" id="p3"></div>
      </div>
    </div>

    <div class="card" style="box-shadow:none;background:#fff7ed80;margin-top:12px">
      <div class="bd">
        <b style="color:#9a3412" id="tipK"></b>
        <span class="muted" id="tip"></span>
      </div>
    </div>

    <div class="muted" style="margin-top:18px;border-top:1px solid var(--line);padding-top:12px">
      © <span id="y"></span> FIRST YEAR PLAYBOOK
    </div>
  </div></div>
</div>

<script>
const LS={lang:"fyp_lang_mp"};
let lang=localStorage.getItem(LS.lang)||"vi";
const $=id=>document.getElementById(id);

const T={
 vi:{
  tagline:"Multi-page • mỗi mục mở tab mới • trắng/cam",
  title:"Làm chủ cổng số = làm chủ cuộc chơi: lịch, điểm, thi, tài liệu, hỗ trợ — tất cả ở đây.",
  sub:"Link có thể thay đổi theo từng kỳ. Nếu link lỗi, bạn ưu tiên tìm trên trang chính của trường hoặc hỏi DVSV.",
  s1:"Cổng học vụ & học liệu",
  p1:[
    {t:"FAP (FPT Academic Portal)",d:"Lịch học, lịch thi, điểm danh, điểm, học phí, đơn từ.",l:"https://fap.fpt.edu.vn"},
    {t:"FLM (Learning Materials)",d:"Syllabus, trọng số điểm, điều kiện pass.",l:"https://flm.fpt.edu.vn"},
    {t:"Edunext",d:"Nộp bài, thảo luận, kiểm tra quá trình.",l:"https://fu-edunext.fpt.edu.vn"},
  ],
  s2:"Phần mềm khảo thí",
  p2:[
    {t:"EOS Client",d:"Dùng cho bài thi trắc nghiệm/Reading/Writing (tùy môn).",l:""},
    {t:"PEA Client",d:"Dùng cho bài thi thực hành/đặc thù (tùy môn).",l:""},
    {t:"Checklist trước ngày thi",d:"Cập nhật phần mềm, thử đăng nhập, chuẩn bị tai nghe.",l:"first30.html"},
  ],
  s3:"Dịch vụ sinh viên & liên hệ",
  p3:[
    {t:"DVSV",d:"Hotline (0236) 730 8686 • dvsv.fudn@fe.edu.vn",l:""},
    {t:"Phòng Khảo thí",d:"Vấn đề thi cử/điểm số • khaothi.fudn@fe.edu.vn",l:""},
    {t:"Khi có sự cố",d:"Báo giám thị + ghi lại bằng chứng (ảnh/lỗi) để được hỗ trợ.",l:""},
  ],
  tipK:"Tip: ",
  tip:"Mỗi tuần mở FAP 1 lần để chốt lịch học/lịch thi. Mỗi môn mở FLM 1 lần để nhớ trọng số điểm."
 },
 en:{
  tagline:"Multi-page • each menu opens a new tab • white/orange",
  title:"Master the portals, master the game: schedules, grades, exams, materials, support—organized here.",
  sub:"Links can change by term. If a link breaks, check official university channels or contact Student Services.",
  s1:"Academic portals & learning materials",
  p1:[
    {t:"FAP (FPT Academic Portal)",d:"Schedule, exams, attendance, grades, tuition, online requests.",l:"https://fap.fpt.edu.vn"},
    {t:"FLM (Learning Materials)",d:"Syllabus, grade weights, pass conditions.",l:"https://flm.fpt.edu.vn"},
    {t:"Edunext",d:"Submissions, discussions, ongoing assessment.",l:"https://fu-edunext.fpt.edu.vn"},
  ],
  s2:"Exam software",
  p2:[
    {t:"EOS Client",d:"Used for MCQ/Reading/Writing exams (course-dependent).",l:""},
    {t:"PEA Client",d:"Used for practical/specific exams (course-dependent).",l:""},
    {t:"Pre-exam checklist",d:"Update software, test login, prepare headphones.",l:"first30.html"},
  ],
  s3:"Student services & contacts",
  p3:[
    {t:"Student Services",d:"Hotline (0236) 730 8686 • dvsv.fudn@fe.edu.vn",l:""},
    {t:"Testing & Assessment Office",d:"Exams/grades • khaothi.fudn@fe.edu.vn",l:""},
    {t:"If something breaks",d:"Tell the invigilator + capture evidence (screenshots/errors).",l:""},
  ],
  tipK:"Tip: ",
  tip:"Weekly: check FAP for schedule/exams. Per course: check FLM for grade weights."
 }
};

function cardHTML(x){
  const link = x.l ? (x.l.startsWith("http") ? `<a href="${x.l}" target="_blank">${x.l}</a>` : `<a href="${x.l}" target="_blank">${x.l}</a>`) : `<span class="small">—</span>`;
  return `<div class="card" style="box-shadow:none"><div class="bd">
    <b>${x.t}</b>
    <div class="muted" style="margin-top:6px">${x.d}</div>
    <div style="margin-top:10px">${link}</div>
  </div></div>`;
}

function render(){
  const t=T[lang];
  $("langBtn").textContent=lang==="vi"?"VI":"EN";
  $("tagline").textContent=t.tagline;
  $("title").textContent=t.title;
  $("sub").textContent=t.sub;
  $("s1").textContent=t.s1; $("s2").textContent=t.s2; $("s3").textContent=t.s3;
  $("tipK").textContent=t.tipK; $("tip").textContent=t.tip;

  $("p1").innerHTML = t.p1.map(cardHTML).join("");
  $("p2").innerHTML = t.p2.map(cardHTML).join("");
  $("p3").innerHTML = t.p3.map(cardHTML).join("");
}
$("langBtn").onclick=()=>{lang=(lang==="vi"?"en":"vi");localStorage.setItem(LS.lang,lang);render();};
$("y").textContent=new Date().getFullYear();
render();
</script>
</body></html>
