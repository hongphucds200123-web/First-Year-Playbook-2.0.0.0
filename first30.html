<!doctype html><html lang="vi"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FIRST YEAR PLAYBOOK • First 30 Days</title>
<style>
:root{--o:#f97316;--line:#ffe2cc;--muted:#64748b;--soft:#fff7ed;--shadow:0 10px 30px rgba(2,6,23,.06);--r:18px}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;background:#fff;color:#0f172a}
.top{position:sticky;top:0;background:rgba(255,255,255,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);z-index:9}
.wrap{max-width:1100px;margin:0 auto;padding:14px 16px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:space-between}
.brand{display:flex;gap:12px;align-items:center}.logo{width:40px;height:40px;border-radius:14px;background:var(--o)}
h1{margin:0;font-size:14px;font-weight:900}.muted{color:var(--muted);font-size:13px;line-height:1.6}
.btn{border:1px solid var(--line);background:#fff;padding:10px 12px;border-radius:14px;cursor:pointer;font-weight:800;font-size:12px}
.btn.primary{background:var(--o);color:#fff;border-color:transparent}.btn.soft{background:var(--soft);color:#9a3412}
.card{border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);background:#fff}
.card .bd{padding:16px}.grid{display:grid;gap:12px}
@media(min-width:900px){.grid2{grid-template-columns:1fr 1fr}}
a{color:var(--o);text-decoration:none}a:hover{text-decoration:underline}
nav{display:flex;gap:8px;flex-wrap:wrap}
nav a{border:1px solid var(--line);padding:8px 10px;border-radius:999px;background:var(--soft);font-weight:800;font-size:12px}
.item{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:14px;padding:10px 12px;background:#fff}
.item.done{opacity:.65}.bar{height:8px;background:#ffedd5;border-radius:999px;overflow:hidden;margin-top:10px}
.bar>div{height:100%;background:var(--o);width:0%}
</style></head><body>
<div class="top"><div class="wrap row">
  <div class="brand"><div class="logo"></div><div>
    <h1 id="brand">FIRST YEAR PLAYBOOK</h1><div class="muted" id="tagline"></div>
  </div></div>
  <div class="row">
    <button class="btn" id="langBtn">VI</button>
    <nav>
      <a href="index.html" target="_blank">Home</a>
      <a href="first30.html" target="_blank">First 30 Days</a>
      <a href="roadmap.html" target="_blank">Roadmap</a>
      <a href="study.html" target="_blank">Study</a>
      <a href="resources.html" target="_blank">Resources</a>
      <a href="templates.html" target="_blank">Templates</a>
      <a href="faq.html" target="_blank">FAQ</a>
    </nav>
  </div>
</div></div>

<div class="wrap">
  <div class="card"><div class="bd">
    <div class="muted" style="font-weight:900;color:#9a3412" id="kicker">FIRST 30 DAYS</div>
    <div style="font-size:26px;font-weight:900;line-height:1.15;margin:10px 0" id="title"></div>
    <div class="muted" id="sub"></div>

    <div style="margin-top:14px" class="card" ><div class="bd">
      <div class="row" style="justify-content:space-between">
        <b id="checkTitle"></b><span class="btn soft" id="pct">0%</span>
      </div>
      <div class="bar"><div id="bar"></div></div>
    </div></div>

    <div class="grid grid2" style="margin-top:12px">
      <div class="card" style="box-shadow:none"><div class="bd">
        <b id="w1"></b><div id="list1" class="grid" style="margin-top:10px"></div>
      </div></div>
      <div class="card" style="box-shadow:none"><div class="bd">
        <b id="w2"></b><div id="list2" class="grid" style="margin-top:10px"></div>
      </div></div>
      <div class="card" style="box-shadow:none"><div class="bd">
        <b id="w3"></b><div id="list3" class="grid" style="margin-top:10px"></div>
      </div></div>
      <div class="card" style="box-shadow:none"><div class="bd">
        <b id="w4"></b><div id="list4" class="grid" style="margin-top:10px"></div>
      </div></div>
    </div>

    <div class="muted" style="margin-top:18px;border-top:1px solid var(--line);padding-top:12px">
      © <span id="y"></span> FIRST YEAR PLAYBOOK
    </div>
  </div></div>
</div>

<script>
const LS={lang:"fyp_lang_mp",done:"fyp_done_mp"};
let lang=localStorage.getItem(LS.lang)||"vi";
let done=JSON.parse(localStorage.getItem(LS.done)||"{}");
const $=id=>document.getElementById(id);

const T={
 vi:{
  tagline:"Multi-page • mỗi mục mở tab mới • trắng/cam",
  title:"Tuần 1–4: thiết lập tài khoản, công cụ, thói quen học — để không bị cuốn trôi.",
  sub:"Tick checklist để lưu trên trình duyệt (không cần đăng nhập thật).",
  checkTitle:"Checklist (tick để lưu)",
  w:["Tuần 1: Set nền","Tuần 2: Set hệ thống học","Tuần 3: Set nhịp điểm số","Tuần 4: Set chiến lược thi"],
  items:[
    ["Cài MyFAP và bật thông báo.","Đăng nhập FAP: xem lịch học/lịch thi/điểm danh.","Vào FLM: mở syllabus 2–3 môn, ghi trọng số điểm.","Tạo lịch cá nhân (Google Calendar) + giờ tự học."],
    ["Chọn 1 template ghi chú (Cornell/Mindmap/Outline).","Chốt nhóm học/nhóm dự án + kênh liên lạc.","Edunext: biết cách nộp bài/thảo luận/quiz.","Chọn 1 kỹ năng mềm luyện 4 tuần (planning/presentation)."],
    ["Theo dõi chuyên cần: nhắm ≥ 90% để an toàn.","Lập bảng: bài tập – deadline – trọng số cho từng môn.","Làm quiz/đề thử sớm để biết dạng.","1 buổi/tuần: tổng kết sai lầm + sửa cách học."],
    ["Ôn theo syllabus trên FLM (đúng trọng tâm).","Cập nhật EOS/PEA trước kỳ thi.","Chuẩn bị tai nghe nếu cần.","Check lịch thi + phòng trên FAP/MyFAP."]
  ]
 },
 en:{
  tagline:"Multi-page • each menu opens a new tab • white/orange",
  title:"Weeks 1–4: set up accounts, tools, and study habits—so you don’t get swept away.",
  sub:"Tick items to save in your browser (no real auth needed).",
  checkTitle:"Checklist (tick to save)",
  w:["Week 1: Foundation","Week 2: Study system","Week 3: Grade rhythm","Week 4: Exam strategy"],
  items:[
    ["Install MyFAP and enable notifications.","Use FAP: schedule/exams/attendance.","Open FLM: check 2–3 syllabi and note grade weights.","Create Google Calendar + self-study blocks."],
    ["Pick one note template (Cornell/Mindmap/Outline).","Form a study/project group + clear channel.","Edunext: learn submission/discussion/quizzes.","Choose one soft skill for 4 weeks (planning/presentation)."],
    ["Track attendance: aim ≥ 90% for safety.","Create per-course table: tasks – deadlines – weights.","Do quizzes/mocks early to learn formats.","Weekly review: mistakes + fix method."],
    ["Revise by FLM syllabus (stay aligned).","Update EOS/PEA before exams.","Prepare headphones if needed.","Check exam schedule + room on FAP/MyFAP."]
  ]
 }
};

function render(){
  const t=T[lang];
  $("langBtn").textContent=lang==="vi"?"VI":"EN";
  $("tagline").textContent=t.tagline;
  $("title").textContent=t.title;
  $("sub").textContent=t.sub;
  $("checkTitle").textContent=t.checkTitle;
  $("w1").textContent=t.w[0]; $("w2").textContent=t.w[1]; $("w3").textContent=t.w[2]; $("w4").textContent=t.w[3];

  const all=t.items.flat();
  const total=all.length;
  let doneCount=0;

  function mount(listEl, arr, offset){
    const box=$(listEl); box.innerHTML="";
    arr.forEach((text,i)=>{
      const idx=offset+i;
      const row=document.createElement("div");
      row.className="item"+(done[idx]?" done":"");
      row.innerHTML=`<input type="checkbox" ${done[idx]?"checked":""}/> <div class="muted" style="font-weight:800;color:#0f172a">${text}</div>`;
      row.querySelector("input").onchange=(e)=>{
        done[idx]=e.target.checked;
        localStorage.setItem(LS.done, JSON.stringify(done));
        render();
      };
      box.appendChild(row);
      if(done[idx]) doneCount++;
    });
  }
  mount("list1", t.items[0], 0);
  mount("list2", t.items[1], 4);
  mount("list3", t.items[2], 8);
  mount("list4", t.items[3], 12);

  const pct=Math.round(doneCount/total*100);
  $("pct").textContent=pct+"%";
  $("bar").style.width=pct+"%";
}

$("langBtn").onclick=()=>{lang=(lang==="vi"?"en":"vi");localStorage.setItem(LS.lang,lang);render();};
$("y").textContent=new Date().getFullYear();
render();
</script>
</body></html>
