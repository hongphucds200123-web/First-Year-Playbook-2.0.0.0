<!doctype html><html lang="vi"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FIRST YEAR PLAYBOOK • Study System</title>
<style>
:root{--o:#f97316;--line:#ffe2cc;--muted:#64748b;--soft:#fff7ed;--shadow:0 10px 30px rgba(2,6,23,.06);--r:18px}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;background:#fff;color:#0f172a}
.top{position:sticky;top:0;background:rgba(255,255,255,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);z-index:9}
.wrap{max-width:1100px;margin:0 auto;padding:14px 16px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:space-between}
.brand{display:flex;gap:12px;align-items:center}.logo{width:40px;height:40px;border-radius:14px;background:var(--o)}
h1{margin:0;font-size:14px;font-weight:900}.muted{color:var(--muted);font-size:13px;line-height:1.6}
.btn{border:1px solid var(--line);background:#fff;padding:10px 12px;border-radius:14px;cursor:pointer;font-weight:800;font-size:12px}
.btn.soft{background:var(--soft);color:#9a3412}
.card{border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);background:#fff}
.card .bd{padding:16px}.grid{display:grid;gap:12px}
a{color:var(--o);text-decoration:none}a:hover{text-decoration:underline}
nav{display:flex;gap:8px;flex-wrap:wrap}
nav a{border:1px solid var(--line);padding:8px 10px;border-radius:999px;background:var(--soft);font-weight:800;font-size:12px}
.block{border:1px solid var(--line);border-radius:14px;background:#fff;padding:14px}
.block b{display:block}
ul{margin:10px 0 0 18px}
</style></head><body>
<div class="top"><div class="wrap row">
  <div class="brand"><div class="logo"></div><div>
    <h1 id="brand">FIRST YEAR PLAYBOOK</h1><div class="muted" id="tagline"></div>
  </div></div>
  <div class="row">
    <button class="btn" id="langBtn">VI</button>
    <nav>
      <a href="index.html" target="_blank">Home</a>
      <a href="first30.html" target="_blank">First 30 Days</a>
      <a href="roadmap.html" target="_blank">Roadmap</a>
      <a href="study.html" target="_blank">Study</a>
      <a href="resources.html" target="_blank">Resources</a>
      <a href="templates.html" target="_blank">Templates</a>
      <a href="faq.html" target="_blank">FAQ</a>
    </nav>
  </div>
</div></div>

<div class="wrap">
  <div class="card"><div class="bd">
    <div class="muted" style="font-weight:900;color:#9a3412" id="kicker">STUDY SYSTEM</div>
    <div style="font-size:26px;font-weight:900;line-height:1.15;margin:10px 0" id="title"></div>
    <div class="muted" id="sub"></div>

    <div class="grid" style="margin-top:12px" id="blocks"></div>

    <div class="card" style="box-shadow:none;background:#fff7ed80;margin-top:12px">
      <div class="bd">
        <b style="color:#9a3412" id="tipK"></b>
        <span class="muted" id="tip"></span>
      </div>
    </div>

    <div class="muted" style="margin-top:18px;border-top:1px solid var(--line);padding-top:12px">
      © <span id="y"></span> FIRST YEAR PLAYBOOK
    </div>
  </div></div>
</div>

<script>
const LS={lang:"fyp_lang_mp"};
let lang=localStorage.getItem(LS.lang)||"vi";
const $=id=>document.getElementById(id);

const T={
 vi:{
  tagline:"Multi-page • mỗi mục mở tab mới • trắng/cam",
  title:"Hệ thống học tốt = hiểu kỳ vọng + quản deadline + ôn đúng trọng tâm.",
  sub:"Bạn học theo syllabus trước, rồi mới học theo cảm xúc. Cảm xúc hay phản bội.",
  blocks:[
    ["1) Syllabus-first","Mỗi tuần đọc syllabus trên FLM: trọng số điểm, điều kiện pass, bài bắt buộc.",
      ["Chụp/ghi lại: Attendance – Progress – Final weight.","Bài nào điểm cao làm trước.","Nếu nhóm trễ, đổi chiến thuật: chia nhỏ task + chốt deadline phụ."]],
    ["2) Timeboxing","Block giờ học: 60–90 phút tập trung + 10 phút nghỉ.",
      ["Mỗi ngày 1 block cho môn khó nhất.","Cuối tuần: 1 block tổng kết + sửa lỗi.","Tắt thông báo, bật đồng hồ — kỷ luật thắng động lực."]],
    ["3) Notes that win","Ghi chú để ôn: mindmap cho trắc nghiệm, outline cho tự luận, checklist cho dự án.",
      ["Tạo 1 trang “Mistakes”: sai ở đâu, vì sao sai, sửa thế nào.","Trước thi 7 ngày: chỉ ôn từ notes + đề thử.","Gặp chủ đề khó: viết lại bằng lời của bạn (Feynman)."]]
  ],
  tipK:"Tip: ",
  tip:"Nếu bạn không biết học cái gì trước: nhìn trọng số điểm trong syllabus. Điểm nặng = học trước."
 },
 en:{
  tagline:"Multi-page • each menu opens a new tab • white/orange",
  title:"A strong study system = clear expectations + deadline control + targeted revision.",
  sub:"Syllabus first, feelings later. Feelings are unreliable.",
  blocks:[
    ["1) Syllabus-first","Weekly: read FLM syllabus—weights, pass conditions, mandatory tasks.",
      ["Capture: Attendance – Progress – Final weights.","Do high-weight tasks first.","If the group is late: split tasks + set mini-deadlines."]],
    ["2) Timeboxing","Block time: 60–90 min focus + 10-min break.",
      ["Daily: 1 block for the hardest course.","Weekend: 1 review block + fix mistakes.","Discipline beats motivation."]],
    ["3) Notes that win","Notes for revision: mindmaps for MCQ, outlines for essays, checklists for projects.",
      ["Maintain a “Mistakes” page: what/why/how to fix.","7 days pre-exam: revise notes + mocks only.","Hard topic: explain in your own words (Feynman)."]]
  ],
  tipK:"Tip: ",
  tip:"If you don’t know what to study first, check grade weights in the syllabus. Heavy weight = first priority."
 }
};

function render(){
  const t=T[lang];
  $("langBtn").textContent=lang==="vi"?"VI":"EN";
  $("tagline").textContent=t.tagline;
  $("title").textContent=t.title;
  $("sub").textContent=t.sub;
  $("tipK").textContent=t.tipK;
  $("tip").textContent=t.tip;

  const box=$("blocks"); box.innerHTML="";
  t.blocks.forEach(b=>{
    const div=document.createElement("div");
    div.className="block";
    div.innerHTML=`<b>${b[0]}</b><div class="muted" style="margin-top:6px">${b[1]}</div>
      <ul class="muted">${b[2].map(x=>`<li>${x}</li>`).join("")}</ul>`;
    box.appendChild(div);
  });
}
$("langBtn").onclick=()=>{lang=(lang==="vi"?"en":"vi");localStorage.setItem(LS.lang,lang);render();};
$("y").textContent=new Date().getFullYear();
render();
</script>
</body></html>
