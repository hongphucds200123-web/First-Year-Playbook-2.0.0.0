<!doctype html><html lang="vi"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FIRST YEAR PLAYBOOK • Roadmap</title>
<style>
:root{--o:#f97316;--line:#ffe2cc;--muted:#64748b;--soft:#fff7ed;--shadow:0 10px 30px rgba(2,6,23,.06);--r:18px}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;background:#fff;color:#0f172a}
.top{position:sticky;top:0;background:rgba(255,255,255,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);z-index:9}
.wrap{max-width:1100px;margin:0 auto;padding:14px 16px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:space-between}
.brand{display:flex;gap:12px;align-items:center}.logo{width:40px;height:40px;border-radius:14px;background:var(--o)}
h1{margin:0;font-size:14px;font-weight:900}.muted{color:var(--muted);font-size:13px;line-height:1.6}
.btn{border:1px solid var(--line);background:#fff;padding:10px 12px;border-radius:14px;cursor:pointer;font-weight:800;font-size:12px}
.btn.soft{background:var(--soft);color:#9a3412}
.card{border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);background:#fff}
.card .bd{padding:16px}.grid{display:grid;gap:12px}
a{color:var(--o);text-decoration:none}a:hover{text-decoration:underline}
nav{display:flex;gap:8px;flex-wrap:wrap}
nav a{border:1px solid var(--line);padding:8px 10px;border-radius:999px;background:var(--soft);font-weight:800;font-size:12px}
.phase{border:1px solid var(--line);border-radius:14px;background:#fff;padding:14px}
.phase b{display:block}
</style></head><body>
<div class="top"><div class="wrap row">
  <div class="brand"><div class="logo"></div><div>
    <h1 id="brand">FIRST YEAR PLAYBOOK</h1><div class="muted" id="tagline"></div>
  </div></div>
  <div class="row">
    <button class="btn" id="langBtn">VI</button>
    <nav>
      <a href="index.html">Home</a>
      <a href="first30.html" >First 30 Days</a>
      <a href="roadmap.html">Roadmap</a>
      <a href="study.html">Study</a>
      <a href="resources.html"">Resources</a>
      <a href="templates.html"">Templates</a>
      <a href="faq.html">FAQ</a>
    </nav>
  </div>
</div></div>

<div class="wrap">
  <div class="card"><div class="bd">
    <div class="muted" style="font-weight:900;color:#9a3412" id="kicker">ROADMAP YEAR 1</div>
    <div style="font-size:26px;font-weight:900;line-height:1.15;margin:10px 0" id="title"></div>
    <div class="muted" id="sub"></div>

    <div class="grid" style="margin-top:12px" id="phases"></div>

    <div class="card" style="box-shadow:none;background:#fff7ed80;margin-top:12px">
      <div class="bd">
        <b style="color:#9a3412" id="noteK"></b>
        <span class="muted" id="note"></span>
      </div>
    </div>

    <div class="muted" style="margin-top:18px;border-top:1px solid var(--line);padding-top:12px">
      © <span id="y"></span> FIRST YEAR PLAYBOOK
    </div>
  </div></div>
</div>

<script>
const LS={lang:"fyp_lang_mp"};
let lang=localStorage.getItem(LS.lang)||"vi";
const $=id=>document.getElementById(id);

const T={
 vi:{
  tagline:"Multi-page • mỗi mục mở tab mới • trắng/cam",
  title:"Một năm chia nhịp: ổn định hệ thống – tăng tốc – tối ưu điểm – chuẩn bị năm 2.",
  sub:"Bạn không cần học nhiều hơn. Bạn cần học đúng thứ tạo ra kết quả.",
  phases:[
    ["P1 (0–4 tuần): Onboarding","Thiết lập công cụ, kỷ luật chuyên cần, hiểu hệ thống học vụ."],
    ["P2 (Tuần 5–10): Performance","Đẩy bài tập/đồ án, học theo trọng số, tạo thói quen ôn sớm."],
    ["P3 (Tuần 11–13): Exam Sprint","Ôn theo syllabus, thi thử, kiểm tra kỹ lịch thi + phần mềm."],
    ["P4 (Sau kỳ): Review & Upgrade","Rút kinh nghiệm, nâng nền tiếng Anh/kỹ năng mềm, chuẩn bị Coursera (nếu có)."]
  ],
  noteK:"Gợi ý: ",
  note:"Mỗi tuần chốt 3 việc: (1) cập nhật lịch/thi trên FAP, (2) đọc syllabus trên FLM, (3) đẩy bài nhóm trên Edunext."
 },
 en:{
  tagline:"Multi-page • each menu opens a new tab • white/orange",
  title:"Year 1 in phases: onboarding → acceleration → grade optimization → prepare Year 2.",
  sub:"You don’t need to study more. You need to study what actually matters.",
  phases:[
    ["P1 (Weeks 0–4): Onboarding","Tools, attendance discipline, academic-policy awareness."],
    ["P2 (Weeks 5–10): Performance","Push assignments/projects, study by weight, revise early."],
    ["P3 (Weeks 11–13): Exam Sprint","Syllabus-based revision, mocks, verify schedule + exam software."],
    ["P4 (Post-term): Review & Upgrade","Reflect, strengthen English/soft skills, prep Coursera (if applicable)."]
  ],
  noteK:"Tip: ",
  note:"Each week, lock 3 actions: (1) update schedule/exams on FAP, (2) read syllabus on FLM, (3) push group tasks on Edunext."
 }
};

function render(){
  const t=T[lang];
  $("langBtn").textContent=lang==="vi"?"VI":"EN";
  $("tagline").textContent=t.tagline;
  $("title").textContent=t.title;
  $("sub").textContent=t.sub;
  $("noteK").textContent=t.noteK;
  $("note").textContent=t.note;

  const box=$("phases"); box.innerHTML="";
  t.phases.forEach(p=>{
    const div=document.createElement("div");
    div.className="phase";
    div.innerHTML=`<b>${p[0]}</b><div class="muted" style="margin-top:6px">${p[1]}</div>`;
    box.appendChild(div);
  });
}
$("langBtn").onclick=()=>{lang=(lang==="vi"?"en":"vi");localStorage.setItem(LS.lang,lang);render();};
$("y").textContent=new Date().getFullYear();
render();
</script>
</body></html>
